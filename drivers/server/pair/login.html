<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      color: #333;
    }
    label {
      display: block;
      margin: 14px 0 4px;
      font-size: 14px;
      color: #555;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
    }
    .checkbox-row label {
      margin: 0;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #2196F3;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status {
      text-align: center;
      margin-top: 10px;
      color: #666;
      font-size: 14px;
    }
    .error {
      text-align: center;
      margin-top: 8px;
      color: #d32f2f;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <label for="host">Host / IP</label>
  <input type="text" id="host" placeholder="192.168.1.50" />

  <label for="username">Username</label>
  <input type="text" id="username" placeholder="Administrator" />

  <label for="password">Password</label>
  <input type="password" id="password" />

  <div class="checkbox-row">
    <input type="checkbox" id="selfsigned" checked />
    <label for="selfsigned">Allow self-signed certificate</label>
  </div>

  <button id="connect-btn" type="button">Connect</button>
  <div id="status" class="status"></div>
  <div id="error-msg" class="error"></div>

  <script>
    // Pair views inject a global `Homey` and the script runs at top level —
    // there is NO reliable onHomeyReady auto-call for pair views, so we do not
    // wrap in onHomeyReady (mirrors the working io.jak.givenergy pair views).
    Homey.setTitle('Connect to iLO');

    var btn = document.getElementById('connect-btn');
    var statusEl = document.getElementById('status');
    var errorEl = document.getElementById('error-msg');

    function submit() {
      var host = document.getElementById('host').value.trim();
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var allowSelfSigned = document.getElementById('selfsigned').checked;

      errorEl.textContent = '';

      if (!host || !username) {
        errorEl.textContent = 'Please enter both a host/IP and a username.';
        return;
      }

      btn.disabled = true;
      statusEl.textContent = 'Connecting…';

      Homey.emit('manual_login', {
        host: host,
        username: username,
        password: password,
        allowSelfSigned: allowSelfSigned,
      }, function (err) {
        if (err) {
          statusEl.textContent = '';
          errorEl.textContent = (err && err.message) ? err.message : String(err);
          btn.disabled = false;
          return;
        }
        Homey.showView('list_devices');
      });
    }

    btn.addEventListener('click', submit);

    document.getElementById('password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') submit();
    });
  </script>
</body>
</html>
